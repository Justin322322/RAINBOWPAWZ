<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#f3e8ff" />
  
  <!-- Icon -->
  <g transform="translate(400, 240)">
    <!-- Deluxe Urn with decorative elements -->
    <path d="M-50,50 C-50,20 -80,-30 -80,-60 L80,-60 C80,-30 50,20 50,50 Z" fill="#c084fc" opacity="0.8" stroke="#a855f7" stroke-width="4" />
    <rect x="-40" y="-80" width="80" height="20" fill="#c084fc" opacity="0.8" stroke="#a855f7" stroke-width="4" />
    <rect x="-30" y="-100" width="60" height="20" fill="#c084fc" opacity="0.8" stroke="#a855f7" stroke-width="4" />
    
    <!-- Decorations -->
    <circle cx="-50" cy="-20" r="10" fill="#e9d5ff" stroke="#a855f7" stroke-width="2" />
    <circle cx="50" cy="-20" r="10" fill="#e9d5ff" stroke="#a855f7" stroke-width="2" />
    <circle cx="-40" cy="10" r="8" fill="#e9d5ff" stroke="#a855f7" stroke-width="2" />
    <circle cx="40" cy="10" r="8" fill="#e9d5ff" stroke="#a855f7" stroke-width="2" />
    
    <!-- Gold Accents -->
    <path d="M-60,-50 H60" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" />
    <path d="M-60,-30 H60" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" />
    <path d="M-50,30 H50" stroke="#fbbf24" stroke-width="3" stroke-linecap="round" />
  </g>
  
  <!-- Sparkles -->
  <g fill="#fcd34d">
    <polygon points="300,140 305,150 310,140 305,130" />
    <polygon points="500,140 505,150 510,140 505,130" />
    <polygon points="350,180 355,190 360,180 355,170" />
    <polygon points="450,180 455,190 460,180 455,170" />
    <polygon points="400,120 405,130 410,120 405,110" />
  </g>
  
  <!-- Labels -->
  <rect x="250" y="350" width="300" height="40" rx="20" fill="#9333ea" opacity="0.9" />
  <text x="400" y="378" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">Premium Cremation</text>
  <text x="400" y="430" font-family="Arial, sans-serif" font-size="18" fill="#581c87" text-anchor="middle">Luxury Memorial Package</text>
</svg> 