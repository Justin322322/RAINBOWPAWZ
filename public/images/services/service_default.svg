<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="#d1fae5" />
  
  <!-- Icon -->
  <g transform="translate(400, 240)">
    <!-- Van/Transportation Icon -->
    <rect x="-80" y="-40" width="160" height="80" rx="20" fill="#34d399" opacity="0.8" stroke="#059669" stroke-width="4" />
    <rect x="-80" y="-10" width="80" height="50" rx="5" fill="#059669" opacity="0.8" />
    <rect x="-70" y="0" width="60" height="30" rx="5" fill="#ecfdf5" opacity="0.8" />
    
    <!-- Wheels -->
    <circle cx="-50" cy="50" r="15" fill="#1f2937" stroke="#059669" stroke-width="2" />
    <circle cx="50" cy="50" r="15" fill="#1f2937" stroke="#059669" stroke-width="2" />
    
    <!-- Red Cross (for services) -->
    <rect x="20" y="-30" width="40" height="15" fill="#f87171" />
    <rect x="32.5" y="-42.5" width="15" height="40" fill="#f87171" />
    
    <!-- Paw Print -->
    <g transform="translate(40, 20) scale(0.3)">
      <path d="M-30,-20 C-40,-35 -60,-35 -70,-15 C-80,5 -70,25 -50,25 C-30,25 -20,-5 -30,-20 Z" fill="white" opacity="0.8" />
      <path d="M30,-20 C20,-35 0,-35 -10,-15 C-20,5 -10,25 10,25 C30,25 40,-5 30,-20 Z" fill="white" opacity="0.8" />
      <path d="M-10,30 C-20,15 -40,15 -50,35 C-60,55 -50,75 -30,75 C-10,75 0,45 -10,30 Z" fill="white" opacity="0.8" />
      <path d="M30,30 C20,15 0,15 -10,35 C-20,55 -10,75 10,75 C30,75 40,45 30,30 Z" fill="white" opacity="0.8" />
      <ellipse cx="0" cy="10" rx="25" ry="30" fill="white" opacity="0.8" />
    </g>
  </g>
  
  <!-- Labels -->
  <rect x="250" y="350" width="300" height="40" rx="20" fill="#059669" opacity="0.9" />
  <text x="400" y="378" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">Additional Services</text>
  <text x="400" y="430" font-family="Arial, sans-serif" font-size="18" fill="#065f46" text-anchor="middle">Home Pickup and Special Care</text>
</svg> 